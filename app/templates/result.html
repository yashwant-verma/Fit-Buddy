<!DOCTYPE html>
<html>

<head>
<title>Workout Result</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container result-container">

<h1>Your Workout Plan</h1>

<div class="plan-box">
{{ workout | safe }}
</div>

<div class="nutrition">
<h3>🥗 Nutrition Tip</h3>
<p>{{ tip }}</p>
</div>

<hr>

<h3>Improve Your Plan</h3>

<form action="/submit-feedback" method="post">

<input type="hidden" name="user_id" value="{{ user_id }}">

<textarea 
name="feedback" 
placeholder="Example: Add yoga, more cardio, reduce intensity" 
required>
</textarea>

<button type="submit">Update Plan</button>

</form>

<br>

<a href="/">
<button class="secondary">Generate Another Plan</button>
</a>

</div>

</body>
</html>
